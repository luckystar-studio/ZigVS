name: build-and-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for example: v0.16.0.0 or version0.16.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'
      - 'version*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Resolve release tag
        id: release_meta
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "${{ inputs.tag }}"
          } else {
            "${{ github.ref_name }}"
          }

          $tag = $tag.Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "A release tag is required."
          }

          if ($tag -notmatch '^(version|v)\d') {
            throw "Release tag [$tag] must start with 'v' or 'version' followed by the version number."
          }

          $tagVersion = $tag -replace '^(version|v)', ''

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$tagVersion" >> $env:GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Check tag matches VSIX version
        shell: pwsh
        run: |
          [xml]$xml = Get-Content 'ZigVS/source.extension.vsixmanifest'
          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace('vsix', 'http://schemas.microsoft.com/developer/vsx-schema/2011')
          $manifestVersion = $xml.SelectSingleNode('//vsix:Metadata/vsix:Identity', $ns).Version
          $tagVersion = "${{ steps.release_meta.outputs.version }}"

          if ($manifestVersion -ne $tagVersion) {
            throw "Tag version [$tagVersion] != manifest version [$manifestVersion]"
          }

      - name: Build VSIX project
        shell: cmd
        run: |
          msbuild ZigVS\ZigVS.csproj /restore /t:Rebuild /m ^
            /p:Configuration=Release ^
            /p:Platform=AnyCPU

      - name: Find VSIX
        id: find_vsix
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path . -Recurse -Filter *.vsix |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $file) {
            throw "VSIX file was not created."
          }

          "path=$($file.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($file.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_vsix.outputs.name }}
          path: ${{ steps.find_vsix.outputs.path }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.release_meta.outputs.tag }}"
          $asset = "${{ steps.find_vsix.outputs.path }}"
          $target = "${{ github.sha }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title "ZigVS $tag" --generate-notes --target $target
          }
